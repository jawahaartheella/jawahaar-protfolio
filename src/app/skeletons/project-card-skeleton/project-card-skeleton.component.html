<div class="group p-6 bg-card/50 rounded-lg space-y-3">
    <div class="aspect-video bg-card/70 rounded-lg animate-pulse"></div>
    <div class="flex flex-col flex-1 h-[150px] gap-2 animate-pulse">
        <div class="h-1/4 bg-card/70 rounded-lg"></div>
        <div class="h-2/4 bg-card/70 rounded-lg"></div>
        <div class="h-1/4 flex flex-row gap-1 rounded-lg">
            @for(num of [1, 2, 3]; track num) {
               <span class="rounded-full bg-card/70 w-1/3"></span> 
            }
        </div>
        <div class="pt-4 mt-4 border-t border-white/5 flex flex-row gap-3 items-center justify-start h-[50px] w-full">
            <div class="w-1/4 rounded-lg h-full bg-card/70"></div>
            <div class="w-1/4 rounded-lg h-full bg-card/70"></div>
        </div>
    </div>
</div>
